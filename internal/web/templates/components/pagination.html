{{define "pagination.html"}}
{{if gt .TotalPages 1}}
<div class="flex items-center justify-center gap-2 mt-6">
    {{if gt .CurrentPage 1}}
    <a href="?page={{.PrevPage}}" class="px-3 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50"
       hx-get="?page={{.PrevPage}}" hx-target="#issues-container" hx-swap="innerHTML">{{T "pagination.previous"}}</a>
    {{end}}
    <span class="text-sm text-gray-500">{{call .Tf "pagination.page_of" .CurrentPage .TotalPages}}</span>
    {{if lt .CurrentPage .TotalPages}}
    <a href="?page={{.NextPage}}" class="px-3 py-1 text-sm border border-gray-300 rounded hover:bg-gray-50"
       hx-get="?page={{.NextPage}}" hx-target="#issues-container" hx-swap="innerHTML">{{T "pagination.next"}}</a>
    {{end}}
</div>
{{end}}
{{end}}

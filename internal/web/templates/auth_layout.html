{{define "auth-base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{{block "title" .}}Xentry{{end}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'media' }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen">
    {{block "content" .}}{{end}}
    <footer class="py-4 text-center text-xs text-gray-400 dark:text-gray-500">
        &copy; {{T "footer.copyright"}} &middot; Xentry v{{.Version}}
    </footer>
</body>
</html>
{{end}}

{{define "title"}}Register — Xentry{{end}}
{{define "content"}}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white dark:bg-gray-900 p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">{{T "auth.register_title"}}</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">{{T "auth.register_subtitle"}}</p>
        </div>
        {{if .Error}}
        <div class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 px-4 py-3 rounded mb-4 text-sm">
            {{.Error}}
        </div>
        {{end}}
        <form hx-post="/api/auth/register" hx-target="#register-result" hx-swap="innerHTML">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{T "auth.name"}}</label>
                <input type="text" name="name"
                       class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-100 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{T "auth.email"}}</label>
                <input type="email" name="email" required
                       class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-100 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{{T "auth.password"}}</label>
                <input type="password" name="password" required
                       class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-gray-100 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md text-sm font-medium hover:bg-blue-700">
                {{T "auth.create_account_btn"}}
            </button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500 dark:text-gray-400">
            {{T "auth.has_account"}}
            <a href="/login" class="text-blue-600 hover:text-blue-500 font-medium">{{T "auth.sign_in_link"}}</a>
        </p>
        <div id="register-result"></div>
    </div>
</div>
{{end}}
